name: Manual npm Publish

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag to publish under"
        required: true
        default: "latest"
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Guard main/master branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ] && [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Manual publish is allowed only from main or master. Current: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify npm authentication
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Validate release readiness
        run: npm run release:check

      - name: Publish package to npm
        run: npm publish --access public --tag "${{ github.event.inputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
